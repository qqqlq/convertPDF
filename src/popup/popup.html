<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Slide PDF Converter</title>
  <link rel="stylesheet" href="./popup.css" />
</head>
<body>
  <h1>Slide PDF Converter</h1>

  <div class="status" id="status">待機中</div>
  <div class="count">キャプチャ枚数: <span id="count">0</span></div>

  <label class="slider-label">
    検知感度（閾値）: <span id="threshold-val">0.15</span>
    <input type="range" id="threshold" min="0.05" max="0.5" step="0.01" value="0.15" />
  </label>

  <div class="buttons">
    <button id="btn-toggle">録画開始</button>
    <button id="btn-pdf" disabled>PDF生成</button>
  </div>

  <script type="module" src="./popup.ts"></script>
</body>
</html>
